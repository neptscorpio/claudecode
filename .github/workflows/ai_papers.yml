name: Daily AI Papers to WeChat

on:
  schedule:
    - cron: "0 1 * * *"   # 每天 UTC 1:00（北京时间 9:00）触发
  workflow_dispatch:        # 允许手动触发

jobs:
  send-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch and send AI papers
        env:
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import datetime

          # 1. 抓取 HuggingFace Daily Papers
          url = "https://huggingface.co/api/daily_papers"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req, timeout=15) as resp:
              papers = json.loads(resp.read())

          # 2. 按 upvotes 排序，取前 8 篇
          papers_sorted = sorted(papers, key=lambda p: p.get("paper", {}).get("upvotes", 0), reverse=True)
          top_papers = papers_sorted[:8]

          # 3. 组装消息内容（Markdown）
          today = datetime.date.today().strftime("%Y-%m-%d")
          lines = [f"## 🤖 AI 论文日报 {today}\n"]
          lines.append(f"来源：[Hugging Face Daily Papers](https://huggingface.co/papers)\n\n---\n")

          for i, item in enumerate(top_papers, 1):
              p = item.get("paper", {})
              title = p.get("title", "N/A")
              upvotes = p.get("upvotes", 0)
              arxiv_id = p.get("id", "")
              abstract = p.get("summary", "")[:300].replace("\n", " ")
              paper_url = f"https://huggingface.co/papers/{arxiv_id}"

              lines.append(f"### {i}. {title}")
              lines.append(f"👍 {upvotes} upvotes")
              lines.append(f"> {abstract}...")
              lines.append(f"[🔗 查看论文]({paper_url})\n")

          content = "\n".join(lines)

          # 4. 发送到 Server酱
          import os
          key = os.environ["SERVER_CHAN_KEY"]
          send_url = f"https://sctapi.ftqq.com/{key}.send"
          payload = json.dumps({
              "title": f"🧠 AI 论文日报 {today}（Top {len(top_papers)}）",
              "desp": content
          }).encode("utf-8")
          req2 = urllib.request.Request(
              send_url,
              data=payload,
              headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req2, timeout=15) as resp2:
              result = json.loads(resp2.read())
              print("发送结果：", result)
          EOF
